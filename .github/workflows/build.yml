name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build plugin
        run: mvn -q -PnodeBuild -DskipTests package
